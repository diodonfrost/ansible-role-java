name: molecule

on:
  push:
  pull_request:
  schedule:
    - cron: '0 18 * * sun'

jobs:
  test:
    name: ${{ matrix.molecule.image }} java ${{ matrix.molecule.java_version }}
    runs-on: ubuntu-latest
    env:
      docker_namepsace: ghcr.io/diodonfrost
    strategy:
      fail-fast: false
      matrix:
        molecule:
          - {image: "almalinux:10", java_version: "latest"}
          - {image: "almalinux:10", java_version: "17"}
          - {image: "almalinux:10", java_version: "11"}
          - {image: "rockylinux:9", java_version: "latest"}
          - {image: "rockylinux:9", java_version: "17"}
          - {image: "rockylinux:9", java_version: "11"}
          - {image: "oraclelinux:10", java_version: "latest"}
          - {image: "oraclelinux:10", java_version: "17"}
          - {image: "oraclelinux:10", java_version: "11"}
          - {image: "amazonlinux:2023", java_version: "latest"}
          - {image: "amazonlinux:2023", java_version: "17"}
          - {image: "amazonlinux:2023", java_version: "11"}
          - {image: "fedora:43", java_version: "latest"}
          - {image: "fedora:43", java_version: "17"}
          - {image: "debian:13", java_version: "latest"}
          - {image: "debian:13", java_version: "17"}
          - {image: "debian:13", java_version: "11"}
          - {image: "debian:12", java_version: "latest"}
          - {image: "debian:12", java_version: "17"}
          - {image: "debian:12", java_version: "11"}
          - {image: "ubuntu:26.04", java_version: "latest"}
          - {image: "ubuntu:26.04", java_version: "17"}
          - {image: "ubuntu:26.04", java_version: "11"}
          - {image: "ubuntu:24.04", java_version: "latest"}
          - {image: "ubuntu:24.04", java_version: "17"}
          - {image: "ubuntu:24.04", java_version: "11"}
          - {image: "opensuse:16.0", java_version: "latest"}
          - {image: "opensuse:16.0", java_version: "11"}
          - {image: "archlinux:latest", java_version: "latest"}
          - {image: "archlinux:latest", java_version: "17"}
          - {image: "archlinux:latest", java_version: "11"}
          - {image: "alpine:latest", java_version: "latest"}
          - {image: "alpine:latest", java_version: "11"}
          - {image: "alpine:latest", java_version: "8"}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Molecule
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Test Ansible role
        run: molecule test
        env:
          namespace: ${{ env.docker_namepsace }}
          image: ansible-${{ matrix.molecule.image }}
          java_version: ${{ matrix.molecule.java_version }}

      - name: Test Ansible role with check_mode enable
        run: molecule check
        env:
          namespace: ${{ env.docker_namepsace }}
          image: ansible-${{ matrix.molecule.image }}
          java_version: ${{ matrix.molecule.java_version }}
